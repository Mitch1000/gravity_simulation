<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <title>Project Fun</title>
    <style>
    	body { margin: 0; }
    </style>
  </head>
  <body>
    <script src="main.js"></script>
    <div class="app">
      <div class="slider-container">
        <div class="slider-info">
        &#916;t
        </div>
        <div class="slider">
          <div id="time-slider" class="slider--handle">
            <div class="slider--handle-scaler">
              <div class="slider--handle-box"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="slider-container">
        <div class="slider-info">
          <span class="material-symbols-outlined">
            search
          </span>
        </div>
        <div class="slider">
          <div id="zoom-slider" class="slider--handle slider--handle-zoom">
            <div class="slider--handle-scaler">
              <div class="slider--handle-box"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="info-box-container">
        <div id="info-box" class="info-box">
          <div id="name">
            Name:
            <span class="value"> </span>
            <input class="info-input" />
          </div>
          <div id="mass">
            Mass:
            <span class="value"> </span>
            <input class="info-input" />
          </div>
          <div class="mass-slider-container">
            <div class="mass-slider--bar">
              <div id="mass-slider" class="mass-slider--handle">
                <div class="mass-slider--handle-scaler">
                  <div class="mass-slider--handle-box"></div>
                </div>
              </div>
            </div>
          </div>
          <div id="density">
            Density:
            <span class="value"> </span>
            <input class="info-input info-input--scale" />
          </div>
          <div id="scale">
            Visual Scale:
            <span class="value"> </span>
            <input class="info-input info-input--scale" />
          </div>
          <div id="position">
            Position:
            <div>
              <span class="value"> </span>
              <input class="info-input info-input-x info-input--scale" />
              <input class="info-input info-input-y info-input--scale" />
            </div>
          </div>
          <div id="velocity"> Velocity:
            <div>
              <span class="value"> </span>
              <input class="info-input info-input-x info-input--scale" />
              <input class="info-input info-input-y info-input--scale" />
            </div>
          </div>
          <div id="acceleration" style="cursor: initial;"> Acceleration:
            <div>
              <span class="value" style="cursor: initial;"> </span>
              <input class="info-input info-input-x info-input--scale" />
              <input class="info-input info-input-y info-input--scale" />
            </div>
          </div>
        </div>
      </div>

      <div class="senario-select-container">
        <select id="senario-select" class="senario-select"></select>
      </div>
    </div>
  </body>
</html>
